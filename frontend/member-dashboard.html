<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Dashboard | APEX FITNESS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #050505; color: #f8f9fa; }
    .header { background: rgba(0,0,0,.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-link { color: #f8f9fa !important; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
    .profile-dropdown-menu { min-width: 200px; }
  </style>
</head>
<body>
  <header class="header py-3">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none">
        <img src="images/logo-red.png" alt="Apex" style="height: 32px;">
        <span class="fs-5 fw-bold">APEX.</span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="nav-link">Home</a>
        <a href="profile.html" class="nav-link">My Profile</a>
        <a id="loginLink" href="login.html" class="nav-link">Login / Sign Up</a>
        <button id="profileIconBtn" class="btn btn-link text-white p-0" style="display:none;">
          <i class="bi bi-person-circle" style="font-size: 24px;"></i>
        </button>
        <div id="profileDropdown" class="profile-dropdown-menu" style="display:none; position:absolute; right:20px; top:80px; background:rgba(0,0,0,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px; z-index:2000;">
          <a href="profile.html" class="d-block text-white text-decoration-none py-2">My Profile</a>
          <button id="logoutHeaderBtn" class="btn btn-sm btn-outline-danger w-100">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div class="mb-4">
      <h1 class="dashboard-title">Member Dashboard</h1>
      <p class="text-muted">Only MEMBER users can access this page.</p>
    </div>

    <div id="memberStatus" class="mb-3 text-secondary"></div>
    <div id="memberSections"></div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadMemberDashboard();
    });
  </script>
</body>
</html>

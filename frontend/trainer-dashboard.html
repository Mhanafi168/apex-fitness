<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Dashboard | APEX FITNESS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">
  <header class="dashboard-header">
    <div class="container-fluid px-4">
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <img src="images/logo-red.png" alt="Apex" class="logo-img">
          <span class="logo-text">APEX TRAINER</span>
        </a>
        <nav class="header-nav">
          <a href="index.html" class="nav-item">Home</a>
          <a href="profile.html" class="nav-item">Profile</a>
          <div class="profile-section">
            <button id="profileIconBtn" class="profile-btn" style="display:none;">
              <i class="bi bi-person-circle"></i>
            </button>
            <a id="loginLink" href="login.html" class="nav-item">Login</a>
            <div id="profileDropdown" class="dropdown-menu" style="display:none;">
              <a href="profile.html" class="dropdown-item">My Profile</a>
              <button id="logoutHeaderBtn" class="dropdown-item danger">Logout</button>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="container-fluid px-4 py-5">
      <div class="dashboard-header-section">
        <div>
          <h1 class="dashboard-title"><i class="bi bi-person-badge"></i> Trainer Dashboard</h1>
          <p class="dashboard-subtitle">Manage your classes and schedule</p>
        </div>
        <div id="trainerStatus" class="status-message"></div>
      </div>

      <div id="trainerSections" class="dashboard-content"></div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadTrainerDashboard();
    });
  </script>
</body>
</html>

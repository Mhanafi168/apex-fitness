<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Apex Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 120px 20px 40px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
        }

        .profile-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-info h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: white;
            font-weight: 700;
        }

        .profile-info p {
            color: #b3b3b3;
            margin: 5px 0;
        }

        .profile-details {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #808080;
            font-size: 0.9rem;
        }

        .detail-value {
            color: white;
            font-weight: 500;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-primary-custom {
            flex: 1;
            background: white;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary-custom:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .btn-logout {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: rgba(255, 0, 0, 0.5);
        }

        .membership-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .dashboard-sections {
            display: grid;
            gap: 24px;
            margin-top: 32px;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
            color: white;
        }

        .dashboard-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .dashboard-card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
        }

        .dashboard-card-title i {
            font-size: 1.4rem;
            color: #ff3b3b;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .status-badge.success { background: #0f9d58; color: white; }
        .status-badge.info { background: #1e88e5; color: white; }
        .status-badge.warning { background: #fbbc04; color: black; }
        .status-badge.danger { background: #d93025; color: white; }
        .status-badge.primary { background: #5c6ac4; color: white; }
        .status-badge.secondary { background: rgba(255,255,255,0.08); color: white; }

        .table-dashboard {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .table-dashboard th,
        .table-dashboard td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #e5e5e5;
            text-align: left;
        }

        .table-dashboard th {
            color: #c7c7c7;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .table-dashboard tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .action-link {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .action-link:hover {
            background: rgba(255,255,255,0.08);
        }

        .empty-state {
            color: #b3b3b3;
            padding: 20px 0;
            font-size: 0.95rem;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            color: #b3b3b3;
        }

        .not-logged-in {
            text-align: center;
            padding: 60px 20px;
        }

        .not-logged-in h2 {
            color: white;
            margin-bottom: 20px;
        }

        .not-logged-in p {
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        .nav-breadcrumb {
            margin-bottom: 30px;
        }

        .nav-breadcrumb a {
            color: #ff0000;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-breadcrumb a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="js/main.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="d-flex align-items-center justify-content-between" style="height: 64px;">
                <a href="index.html" class="d-flex align-items-center gap-3 text-decoration-none">
                    <img src="images/logo-red.png" alt="Apex" class="logo">
                    <span class="text-white fs-5 tracking-tighter" style="font-family: 'Syncopate', sans-serif; font-weight: 700;">APEX.</span>
                </a>
                <div class="d-none d-md-flex align-items-center gap-4">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="index.html#about" class="nav-link">About</a>
                    <div class="lang-dropdown">
                        <button class="nav-link lang-btn border-0 bg-transparent">EN</button>
                        <div class="lang-dropdown-menu">
                            <button class="lang-dropdown-item lang-option active" data-lang="en">English</button>
                            <div class="lang-dropdown-divider"></div>
                            <button class="lang-dropdown-item lang-option" data-lang="ar">العربية</button>
                        </div>
                    </div>
                    <div class="profile-dropdown-header" id="profileDropdownHeader" style="display: none; position: relative;">
                        <button class="profile-icon-btn" style="background: none; border: none; cursor: pointer; color: white; font-size: 20px;">
                            <i class="bi bi-person-circle"></i>
                        </button>
                        <div class="profile-dropdown-menu" style="display: none; position: absolute; top: 100%; right: 0; background: rgba(0, 0, 0, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; min-width: 200px; z-index: 1000;">
                            <a href="profile.html" style="display: block; padding: 12px 20px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">My Profile</a>
                            <button id="logoutBtn" style="display: block; width: 100%; padding: 12px 20px; background: none; border: none; color: #ff0000; text-align: left; cursor: pointer; font-size: 0.9rem;">Logout</button>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <div class="profile-container">
        <div class="container">
            <div class="nav-breadcrumb">
                <a href="index.html"><i class="bi bi-chevron-left"></i> Back to Home</a>
            </div>

            <div id="loadingSpinner" class="loading-spinner">
                <p>Loading profile...</p>
            </div>

            <div id="notLoggedIn" class="not-logged-in" style="display: none;">
                <h2>Access Denied</h2>
                <p>You need to be logged in to view this page.</p>
                <a href="login.html" class="btn btn-primary-custom" style="max-width: 200px; margin: 0 auto;">
                    <i class="bi bi-box-arrow-in-right"></i> Go to Login
                </a>
            </div>

            <div id="profileContent" style="display: none;">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>

                    <div class="profile-info">
                        <h1 id="userName">User Name</h1>
                        <p id="userRole" style="color: #ff0000; font-weight: 600;">MEMBER</p>
                        <span class="membership-badge" id="membershipStatus">Active Member</span>
                    </div>

                    <div class="profile-details">
                        <div class="detail-item">
                            <span class="detail-label">Email Address</span>
                            <span class="detail-value" id="userEmail">-</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Account Type</span>
                            <span class="detail-value" id="userType">Standard</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Join Date</span>
                            <span class="detail-value" id="joinDate">-</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <a id="primaryActionBtn" href="payment.html" class="btn-primary-custom">
                            <i class="bi bi-credit-card"></i> Upgrade Plan
                        </a>
                        <button id="logoutBtnMain" class="btn-logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </div>
                </div>
                <div id="dashboardSections" class="dashboard-sections" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = getToken();
            const loadingSpinner = document.getElementById('loadingSpinner');
            const notLoggedIn = document.getElementById('notLoggedIn');
            const profileContent = document.getElementById('profileContent');
            const profileDropdownHeader = document.getElementById('profileDropdownHeader');
            const dashboardSections = document.getElementById('dashboardSections');

            if (!token) {
                loadingSpinner.style.display = 'none';
                notLoggedIn.style.display = 'block';
                return;
            }

            loadingSpinner.style.display = 'block';
            profileDropdownHeader.style.display = 'block';

            try {
                const userData = await apiFetch('/api/auth/me');
                if (!userData || userData.error) {
                    throw new Error('Failed to load profile');
                }

                const role = (userData.role || getRole() || 'MEMBER').toUpperCase();
                const userName = userData.fullName || userData.username || 'User';

                document.getElementById('userName').textContent = userName;
                document.getElementById('userEmail').textContent = userData.email || '-';
                document.getElementById('userRole').textContent = role;
                document.getElementById('userType').textContent = role === 'MEMBER'
                    ? (userData.membershipType || 'Standard')
                    : role === 'TRAINER'
                        ? 'Trainer'
                        : 'Administrator';

                const actionBtn = document.getElementById('primaryActionBtn');
                const membershipBadge = document.getElementById('membershipStatus');

                if (role === 'MEMBER') {
                    membershipBadge.textContent = userData.membershipType
                        ? `${userData.membershipType} Member`
                        : 'Active Member';
                    actionBtn.textContent = 'Upgrade Plan';
                    actionBtn.href = 'payment.html';
                } else if (role === 'TRAINER') {
                    membershipBadge.textContent = 'Trainer Access';
                    actionBtn.textContent = 'View Classes';
                    actionBtn.href = 'index.html#classes';
                } else {
                    membershipBadge.textContent = 'Admin Access';
                    actionBtn.textContent = 'Manage Users';
                    actionBtn.href = 'index.html';
                }

                actionBtn.style.display = 'inline-flex';

                if (userData.createdAt || userData.joinedDate) {
                    const date = new Date(userData.createdAt || userData.joinedDate);
                    document.getElementById('joinDate').textContent = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } else {
                    document.getElementById('joinDate').textContent = '-';
                }

                await renderDashboardSections(role, userData, dashboardSections);
                loadingSpinner.style.display = 'none';
                profileContent.style.display = 'block';
            } catch (error) {
                console.error('Profile load error:', error);
                loadingSpinner.style.display = 'none';
                notLoggedIn.style.display = 'block';
            }

            const setupLogout = () => {
                clearAuth();
                window.location.href = 'login.html';
            };

            document.getElementById('logoutBtn').addEventListener('click', setupLogout);
            document.getElementById('logoutBtnMain').addEventListener('click', setupLogout);

            const profileBtn = document.querySelector('.profile-icon-btn');
            const profileDropdown = document.querySelector('.profile-dropdown-menu');
            if (profileBtn) {
                profileBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropdown.style.display = profileDropdown.style.display === 'none' ? 'block' : 'none';
                });
            }
            document.addEventListener('click', () => {
                if (profileDropdown) {
                    profileDropdown.style.display = 'none';
                }
            });
        });

        async function renderDashboardSections(role, userData, container) {
            container.innerHTML = '';
            container.style.display = 'grid';

            if (role === 'ADMIN') {
                container.appendChild(createSectionCard('Users Overview', 'bi-people-fill', await buildAdminUsersSection()));
                return;
            }

            if (role === 'MEMBER') {
                const member = await apiFetch(`/api/members/user/${userData.id}`);
                container.appendChild(createSectionCard('Membership Info', 'bi-file-medical', buildMemberInfoSection(member)));
                if (member && !member.error) {
                    const payments = await apiFetch(`/api/payments/member/${member.id}`);
                    container.appendChild(createSectionCard('Payment History', 'bi-wallet2', buildPaymentHistorySection(payments)));
                } else {
                    container.appendChild(createSectionCard('Payment History', 'bi-wallet2', createEmptyState('Membership data not found. Payment history is unavailable.')));
                }
                return;
            }

            if (role === 'TRAINER') {
                const trainer = await apiFetch(`/api/trainers/user/${userData.id}`);
                container.appendChild(createSectionCard('Trainer Profile', 'bi-person-badge', buildTrainerProfileSection(trainer)));
                if (trainer && !trainer.error) {
                    const classes = await apiFetch(`/api/trainers/${trainer.id}/classes`);
                    container.appendChild(createSectionCard('Assigned Classes', 'bi-calendar-check', buildAssignedClassesSection(classes)));
                } else {
                    container.appendChild(createSectionCard('Assigned Classes', 'bi-calendar-check', createEmptyState('Trainer profile missing. Unable to load assigned classes.')));
                }
                return;
            }

            container.appendChild(createSectionCard('Dashboard', 'bi-speedometer2', createEmptyState('No dashboard sections available for your role.')));
        }

        async function buildAdminUsersSection() {
            const section = document.createElement('div');
            const users = await apiFetch('/api/auth/admin/users');
            if (!users || users.error) {
                section.appendChild(createEmptyState('Unable to load users overview.')); 
                return section;
            }

            if (!Array.isArray(users) || users.length === 0) {
                section.appendChild(createEmptyState('No users found in auth database.'));
                return section;
            }

            const table = document.createElement('table');
            table.className = 'table-dashboard';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    ${users.map(user => `
                        <tr>
                            <td>${escapeHtml(user.id)}</td>
                            <td>${escapeHtml(user.username)}</td>
                            <td>${escapeHtml(user.email)}</td>
                            <td>${escapeHtml(user.role)}</td>
                            <td>${createBadgeHtml(user.active ? 'Active' : 'Inactive', user.active ? 'success' : 'danger')}</td>
                            <td>
                                <button class="action-link admin-user-action" data-user-id="${user.id}" data-user-active="${user.active || false}">
                                    ${user.active ? 'Deactivate' : 'Activate'}
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>`;

            section.appendChild(table);
            section.addEventListener('click', async (event) => {
                const button = event.target.closest('.admin-user-action');
                if (!button) return;
                const userId = button.getAttribute('data-user-id');
                const isActive = button.getAttribute('data-user-active') === 'true';
                const endpoint = `/api/auth/admin/users/${userId}/${isActive ? 'deactivate' : 'activate'}`;
                button.disabled = true;
                button.textContent = isActive ? 'Deactivating...' : 'Activating...';
                const result = await apiFetch(endpoint, { method: 'PUT' });
                button.disabled = false;
                if (result && result.error) {
                    alert('Unable to update user status.');
                    return;
                }
                const refreshedSection = await buildAdminUsersSection();
                section.innerHTML = '';
                section.append(...refreshedSection.childNodes);
            });

            return section;
        }

        function buildMemberInfoSection(member) {
            if (!member || member.error) {
                return createEmptyState('Could not retrieve membership information.');
            }
            const content = document.createElement('div');
            content.innerHTML = `
                <div class="detail-item">
                    <span class="detail-label">Full Name</span>
                    <span class="detail-value">${escapeHtml(member.fullName || '-')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${escapeHtml(member.email || '-')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Membership Type</span>
                    <span class="detail-value">${escapeHtml(member.membershipType || 'Standard')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Status</span>
                    <span class="detail-value">${createBadgeHtml(member.status || 'UNKNOWN', getBadgeClass(member.status))}</span>
                </div>
            `;
            return content;
        }

        function buildPaymentHistorySection(payments) {
            if (!payments || payments.error) {
                return createEmptyState('Could not retrieve payment history.');
            }
            if (!Array.isArray(payments) || payments.length === 0) {
                return createEmptyState('No payment records found.');
            }

            const section = document.createElement('div');
            const table = document.createElement('table');
            table.className = 'table-dashboard';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Reference</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    ${payments.map(payment => `
                        <tr>
                            <td>${escapeHtml(formatCurrency(payment.amount, payment.currency))}</td>
                            <td>${createBadgeHtml(payment.status || 'UNKNOWN', getBadgeClass(payment.status))}</td>
                            <td>${escapeHtml(payment.transactionReference || '-')}</td>
                            <td>${escapeHtml(formatDate(payment.paidAt || payment.createdAt) || '-')}</td>
                        </tr>
                    `).join('')}
                </tbody>`;
            section.appendChild(table);
            return section;
        }

        function buildTrainerProfileSection(trainer) {
            if (!trainer || trainer.error) {
                return createEmptyState('Could not retrieve trainer details.');
            }
            const content = document.createElement('div');
            content.innerHTML = `
                <div class="detail-item">
                    <span class="detail-label">Full Name</span>
                    <span class="detail-value">${escapeHtml(trainer.fullName || '-')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Specialization</span>
                    <span class="detail-value">${escapeHtml(trainer.specialization || 'General Fitness')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${escapeHtml(trainer.email || '-')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Status</span>
                    <span class="detail-value">${createBadgeHtml(trainer.status || 'UNKNOWN', getBadgeClass(trainer.status))}</span>
                </div>
            `;
            return content;
        }

        function buildAssignedClassesSection(classes) {
            if (!classes || classes.error) {
                return createEmptyState('Could not retrieve assigned classes.');
            }
            if (!Array.isArray(classes) || classes.length === 0) {
                return createEmptyState('No assigned classes found.');
            }
            const section = document.createElement('div');
            const table = document.createElement('table');
            table.className = 'table-dashboard';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Class</th>
                        <th>Location</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${classes.map(gymClass => `
                        <tr>
                            <td>${escapeHtml(gymClass.name || '-')}</td>
                            <td>${escapeHtml(gymClass.location || '-')}</td>
                            <td>${escapeHtml(formatDate(gymClass.classDateTime) || '-')}</td>
                            <td>${createBadgeHtml(gymClass.status || 'UNKNOWN', getBadgeClass(gymClass.status))}</td>
                        </tr>
                    `).join('')}
                </tbody>`;
            section.appendChild(table);
            return section;
        }

        function createSectionCard(title, icon, contentNode) {
            const card = document.createElement('div');
            card.className = 'dashboard-card';
            const header = document.createElement('div');
            header.className = 'dashboard-card-header';
            const titleEl = document.createElement('div');
            titleEl.className = 'dashboard-card-title';
            titleEl.innerHTML = `<i class="bi ${icon}"></i><span>${escapeHtml(title)}</span>`;
            header.appendChild(titleEl);
            card.appendChild(header);
            card.appendChild(contentNode);
            return card;
        }

        function createEmptyState(message) {
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.textContent = message;
            return empty;
        }

        function formatCurrency(amount, currency) {
            if (amount == null) return '-';
            const value = typeof amount === 'object' && amount.toString ? amount.toString() : amount;
            const formatted = parseFloat(value).toFixed(2);
            return `${currency || 'USD'} ${formatted}`;
        }

        function formatDate(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getBadgeClass(status) {
            if (!status) return 'secondary';
            const normalized = status.toString().toUpperCase();
            if (['ACTIVE', 'COMPLETED'].includes(normalized)) return 'success';
            if (['PENDING', 'SCHEDULED', 'IN_PROGRESS'].includes(normalized)) return 'warning';
            if (['FAILED', 'INACTIVE', 'CANCELLED', 'SUSPENDED'].includes(normalized)) return 'danger';
            if (['ADMIN', 'TRAINER', 'MEMBER'].includes(normalized)) return 'primary';
            return 'secondary';
        }

        function createBadgeHtml(text, variant) {
            const safeText = escapeHtml(text || 'Unknown');
            return `<span class="status-badge ${escapeHtml(variant || 'secondary')}">${safeText}</span>`;
        }
    </script>
</body>
</html>

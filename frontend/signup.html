<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN | APEX ELITE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --text: #ffffff; --muted: #404040; --border: #262626; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; width: 100vw; direction: rtl; }
        .visual-side { position: relative; overflow: hidden; background: #0a0a0a; }
        .visual-side img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.1); transition: transform 2s ease; }
        .visual-side:hover img { transform: scale(1.1); }
        .visual-side::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to left, transparent, var(--bg)); }
        .floating-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; font-family: 'Syncopate', sans-serif; font-size: 8vw; opacity: 0.1; pointer-events: none; white-space: nowrap; }
        .form-side { display: flex; flex-direction: column; padding: 60px; justify-content: center; position: relative; direction: ltr; }
        .top-nav { position: absolute; top: 40px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .back-home { color: var(--text); text-decoration: none; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; display: flex; align-items: center; gap: 10px; transition: 0.3s; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px; backdrop-filter: blur(10px); }
        .back-home:hover { opacity: 0.6; transform: translateX(-5px); background: rgba(255,255,255,0.1); }
        .form-content { max-width: 400px; margin: 0 auto; width: 100%; animation: fadeIn 1s ease-out; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .brand-mark { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 40px; display: block; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 10px; line-height: 0.9; }
        .subtitle { color: var(--muted); margin-bottom: 40px; font-size: 0.9rem; letter-spacing: 0.05em; }
        .input-group-v2 { margin-bottom: 25px; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .input-group-v2:focus-within { border-bottom-color: #fff; }
        .input-group-v2 label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 5px; }
        .input-group-v2 input { width: 100%; background: none; border: none; padding: 10px 0; color: #fff; outline: none; font-size: 1rem; }
        .btn-black { background: #fff; color: #000; border: none; padding: 20px; width: 100%; font-family: 'Syncopate', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; margin-top: 20px; transition: 0.4s; cursor: pointer; }
        .btn-black:hover { background: #e0e0e0; transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255,255,255,0.1); }
        .signup-cta { margin-top: 40px; text-align: center; font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 30px; }
        .signup-cta a { color: #fff; font-weight: 900; text-decoration: none; margin-left: 10px; border-bottom: 1px solid #fff; }
        @media (max-width: 992px) { 
            .main-grid { grid-template-columns: 1fr; } 
            .visual-side { display: none; } 
            .form-side { padding: 120px 20px 40px; } 
            .top-nav { left: 20px; right: 20px; top: 20px; }
            .brand-mark { margin-bottom: 30px; font-size: 1.2rem; }
            h1 { font-size: 2.5rem; }
        }
    </style>
    <script src="js/main.js"></script>
    <script>
    async function register() {
        const email = document.getElementById('email').value;
        const data = await apiFetch('/api/auth/register', {
            method: 'POST',
            body: JSON.stringify({
                username: email,
                email: email,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                role: 'MEMBER'
            })
        });
        if (data && data.accessToken) {
            saveAuth(data.accessToken, 'MEMBER', document.getElementById('email').value);
            redirectByRole('MEMBER');
        } else {
            const msg = (data && (data.error || data.message)) || 'Registration failed';
            alert(msg + (data && data.status ? ' (' + data.status + ')' : ''));
        }
    }
    </script>
</head>
<body>
    <div class="main-grid">
        <div class="visual-side">
            <img src="images/signup-new.jpg" alt="Fitness">
            <div class="floating-label">JOIN</div>
        </div>
        <div class="form-side">
            <div class="top-nav">
                <a href="index.html" class="back-home"><i class="bi bi-arrow-left"></i> CORE</a>
                <img src="images/logo-red.png" alt="Logo" style="height: 25px;">
            </div>
            <div class="form-content">
                <span class="brand-mark">APEX.</span>
                <h1>START YOUR<br>EVOLUTION</h1>
                <p class="subtitle">Create your unique identity in the zone.</p>
                <form onsubmit="event.preventDefault(); register()">
                    <div class="input-group-v2">
                        <label>Full Name</label>
                        <input id="fullName" type="text" placeholder="CITIZEN NAME" required>
                    </div>
                    <div class="input-group-v2">
                        <label>Identity</label>
                        <input id="email" type="email" placeholder="EMAIL@DOMAIN.COM" required>
                    </div>
                    <div class="input-group-v2">
                        <label>Secure Key</label>
                        <input id="password" type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-black">INITIALIZE</button>
                </form>
                <div class="signup-cta">
                    ALREADY EVOLVED? <a href="login.html">ACCESS CORE</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
